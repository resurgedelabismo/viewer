<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RESURGE — Visor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#000;--surface:#0c0c0c;--card:#111;--border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.12);--accent:#0070ff;--ag:rgba(0,112,255,.08);
  --ok:#00e87a;--err:#ff3b30;--warn:#ffd60a;
  --txt:#fff;--muted:#555;--muted2:#888;
  --serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif;
  --r:10px;--nav:220px;--tab:56px;--tr:.18s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── LAYOUT ── */
.app{display:flex;min-height:100dvh}
.sidebar{width:var(--nav);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:100}
.sb-brand{padding:26px 20px 22px;border-bottom:1px solid var(--border)}
.sb-brand .logo{font-family:var(--serif);font-size:1.05rem;letter-spacing:10px;font-weight:400}
.sb-brand .sub{font-size:.6rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:3px}
.db-status{margin-top:12px;font-size:.62rem;letter-spacing:.8px;color:var(--muted);display:flex;align-items:center;gap:6px}
.db-status .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.db-status.on .dot{background:var(--ok);box-shadow:0 0 6px rgba(0,232,122,.5)}
.db-status.on{color:var(--muted2)}
.sb-nav{padding:10px 0;flex:1;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:.8rem;letter-spacing:.3px;color:var(--muted2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all var(--tr);border-left:2px solid transparent;font-family:var(--sans);font-weight:500}
.nav-btn:hover{color:var(--txt);background:rgba(255,255,255,.03)}
.nav-btn.on{color:var(--txt);border-left-color:var(--accent);background:var(--ag)}
.nav-btn svg{flex-shrink:0;opacity:.6}
.nav-btn.on svg{opacity:1}
.sb-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:.58rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.main{flex:1;margin-left:var(--nav);display:flex;flex-direction:column;min-height:100dvh}
.topbar{position:sticky;top:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 28px;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px}
.topbar-title{font-size:.68rem;letter-spacing:4px;color:var(--muted2);text-transform:uppercase;font-weight:600}
.search-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:8px 14px;color:var(--txt);font-family:var(--sans);font-size:.8rem;width:210px;outline:none;transition:border-color var(--tr)}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.content{padding:26px;flex:1}

/* Mobile */
.m-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.96);backdrop-filter:blur(14px);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.m-tabs-inner{display:flex}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:.52rem;letter-spacing:.4px;cursor:pointer;transition:color var(--tr);text-transform:uppercase}
.tab-btn.on{color:var(--accent)}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;margin-bottom:var(--tab)}
  .m-tabs{display:block}
  .topbar{padding:11px 16px}
  .content{padding:14px}
  .search-box{width:130px}
}

/* ── CARDS & COMPONENTS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color var(--tr)}
.card:hover{border-color:var(--border2)}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.56rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--border2);color:var(--muted2)}
.tag-bronce{border-color:#5e3a24;color:#ffcaad}
.tag-plata{border-color:#666;color:#e0e0e0}
.tag-oro{border-color:#aa8800;color:#ffd700}
.tag-diamante{border-color:var(--accent);color:#00d4ff}
.tag-ok{border-color:var(--ok);color:var(--ok)}
.tag-err{border-color:var(--err);color:var(--err)}
.tag-acc{border-color:var(--accent);color:var(--accent)}
.tag-warn{border-color:var(--warn);color:var(--warn)}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);font-size:.68rem;cursor:pointer;color:var(--muted2);background:none;font-family:var(--sans);transition:all var(--tr)}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all var(--tr)}
.row:last-child{border-bottom:none}
.row:hover{padding-left:8px;padding-right:8px;margin:0 -8px;border-radius:8px;background:rgba(255,255,255,.025)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--ag);border:1px solid rgba(0,112,255,.3);display:flex;align-items:center;justify-content:center;font-size:.84rem;font-weight:700;color:var(--accent);flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:960px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.g2,.g3,.g4{grid-template-columns:1fr}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 16px;text-align:center}
.stat-card .lbl{font-size:.56rem;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.stat-card .val{font-family:var(--serif);font-size:1.4rem;font-weight:400}
.stat-card .val.ok{color:var(--ok)}
.stat-card .val.err{color:var(--err)}
.prog-track{background:rgba(255,255,255,.04);height:5px;border-radius:3px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease}
.prog-fill.good{background:var(--ok);box-shadow:0 0 8px rgba(0,232,122,.3)}
.prog-fill.mid{background:var(--accent);box-shadow:0 0 8px rgba(0,112,255,.3)}
.prog-fill.bad{background:var(--err);box-shadow:0 0 8px rgba(255,59,48,.3)}
.section-lbl{font-size:.58rem;letter-spacing:3.5px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:14px}
.mov-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.mov-row:last-child{border-bottom:none}
.mov-t{font-size:.82rem;font-weight:500;margin-bottom:2px}
.mov-s{font-size:.63rem;color:var(--muted)}
.mov-m{font-size:.9rem;font-weight:700}
.mov-m.cargo{color:var(--err)}
.mov-m.abono{color:var(--ok)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--muted2);font-family:var(--sans);font-size:.78rem;margin-bottom:18px;padding:0;transition:color var(--tr)}
.back-btn:hover{color:var(--txt)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--r);font-family:var(--sans);font-size:.76rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all var(--tr)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:#0060e0}
.btn-g{background:transparent;border-color:var(--border2);color:var(--muted2)}
.btn-g:hover{border-color:var(--txt);color:var(--txt)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty p{font-size:.78rem}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.select-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:9px 14px;color:var(--txt);font-family:var(--sans);font-size:.8rem;outline:none;cursor:pointer}
.select-box:focus{border-color:var(--accent)}
option{background:#111}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:10px 22px;font-size:.76rem;color:var(--muted2);z-index:999;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── DROPZONE ── */
#dropzone{border:2px dashed var(--border2);border-radius:16px;padding:56px 36px;text-align:center;cursor:pointer;transition:all var(--tr);max-width:480px;margin:0 auto}
#dropzone:hover,#dropzone.drag{border-color:var(--accent);background:var(--ag)}
#dropzone h3{font-family:var(--serif);font-size:1.5rem;font-weight:400;margin:16px 0 8px}
#dropzone p{font-size:.76rem;color:var(--muted);line-height:1.65}
#dropzone .hint{margin-top:18px;font-size:.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}

/* ── PRODUCT CARD ── */
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color var(--tr),transform var(--tr)}
.prod-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.prod-img{width:100%;aspect-ratio:1;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.58rem;letter-spacing:2px;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-info{padding:14px}
.prod-brand{font-size:.58rem;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
.prod-name{font-size:.88rem;font-weight:600;line-height:1.3;margin-bottom:3px}
.prod-detail{font-size:.68rem;color:var(--muted2);margin-bottom:10px}
.prod-foot{display:flex;justify-content:space-between;align-items:baseline}
.prod-price{font-family:var(--serif);font-size:1.1rem}
.prod-stock{font-size:.62rem;color:var(--muted)}

/* ── HERO BALANCE ── */
.hero-balance{text-align:center;padding:30px 24px;background:radial-gradient(circle at 50% 0%,var(--ag) 0%,transparent 70%),linear-gradient(180deg,#0a0a0a,#000);border:1px solid rgba(0,112,255,.12);border-radius:16px;margin-bottom:20px}
.hero-balance.red{border-color:rgba(255,59,48,.2)}
.hero-balance.green{border-color:rgba(0,232,122,.15)}
.hero-balance .hl{font-size:.58rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.hero-balance .hv{font-family:var(--serif);font-size:clamp(2rem,6vw,3.2rem);font-weight:400}
.hero-balance.red .hv{color:var(--err)}
.hero-balance.green .hv{color:var(--ok)}
.stat-row{display:flex;gap:20px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.stat-row>div{flex:1;text-align:center}
.stat-row .sl{font-size:.56rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.stat-row .sv{font-family:var(--serif);font-size:1.1rem}
.stat-row .sv.ok{color:var(--ok)}

/* ── ESTADO DE CUENTA ── */
.ec-wrap{max-width:760px;margin:0 auto}
.ec-brand{font-family:var(--serif);font-size:.8rem;letter-spacing:14px;color:var(--muted2);text-align:center;margin-bottom:14px}
.ec-name{font-family:var(--serif);font-size:clamp(1.7rem,5vw,2.6rem);font-weight:400;text-align:center;margin-bottom:8px}
.ec-venta{padding:18px 0;border-bottom:1px solid var(--border)}
.ec-venta:last-child{border-bottom:none}
.ec-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:480px){.ec-grid2{grid-template-columns:1fr}.stat-row{flex-wrap:wrap}.stat-row>div{flex:0 0 45%}}

/* ── FLUJO CAJA ── */
.fl-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.78rem}
.fl-row:last-child{border-bottom:none}

/* ── VIEW ROUTING ── */
.view{display:none}
.view.on{display:block}

/* ── PRINT ── */
@media print{
  .sidebar,.topbar,.m-tabs,.no-print,#dropzone,.view:not(#view-estado){display:none!important}
  .main{margin:0}
  body{background:#fff;color:#000}
  .ec-wrap,.hero-balance,.card{border:1px solid #ddd!important;background:#fff!important}
  .ec-brand,.ec-name,.hl,.hv,.sl,.sv,.section-lbl,.mov-t,.mov-s,.mov-m,.prod-name{color:#000!important}
  .hv{color:#000!important}
  .hero-balance.red .hv{color:#c00!important}
  #view-estado{display:block!important}
  .content{padding:0}
}
</style>
</head>
<body>
<div class="app">

<!-- ══ SIDEBAR ══ -->
<nav class="sidebar">
  <div class="sb-brand">
    <div class="logo">RESURGE</div>
    <div class="sub">Visor de Datos</div>
    <div class="db-status" id="dbStatus">
      <span class="dot"></span>
      <span id="dbStatusTxt">Sin base de datos</span>
    </div>
  </div>
  <div class="sb-nav">
    <button class="nav-btn on" onclick="go('inicio')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nav-btn" onclick="go('miembros')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Miembros
    </button>
    <button class="nav-btn" onclick="go('catalogo')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="6" height="6" rx="1"/><rect x="9" y="3" width="6" height="6" rx="1"/><rect x="16" y="3" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="9" y="10" width="6" height="6" rx="1"/><rect x="16" y="10" width="6" height="6" rx="1"/><rect x="2" y="17" width="6" height="6" rx="1"/><rect x="9" y="17" width="6" height="6" rx="1"/><rect x="16" y="17" width="6" height="6" rx="1"/></svg>
      Catálogo
    </button>
    <button class="nav-btn" onclick="go('estado')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Estado de Cuenta
    </button>
    <button class="nav-btn" onclick="go('flujo')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Flujo de Caja
    </button>
  </div>
  <div class="sb-foot">APPRESURGE · VISOR v1.0</div>
</nav>

<!-- ══ MAIN ══ -->
<main class="main">
  <div class="topbar">
    <span class="topbar-title" id="topTitle">Dashboard</span>
    <div style="display:flex;gap:10px;align-items:center">
      <input class="search-box" id="searchBox" placeholder="Buscar..." oninput="onSearch(this.value)" style="display:none">
      <button class="btn btn-g no-print" id="printBtn" onclick="window.print()" style="display:none">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir
      </button>
    </div>
  </div>

  <div class="content">

    <!-- INICIO -->
    <div class="view on" id="view-inicio">
      <div id="landing">
        <div id="dropzone" onclick="document.getElementById('fi').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="onDrop(event)">
          <input type="file" id="fi" accept=".db,.sqlite,.sqlite3,.png" onchange="loadFile(this.files[0])">
          <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:.25"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          <h3>Cargar base de datos</h3>
          <p>Arrastra <strong>AppResurge.db</strong> o una imagen <strong>PNG</strong> exportada desde la app.</p>
          <div class="hint">DB (.db) o imagen PNG exportada desde AppResurge · Solo lectura</div>
        </div>
      </div>
      <div id="dash" style="display:none"></div>
    </div>

    <!-- MIEMBROS -->
    <div class="view" id="view-miembros">
      <div id="m-list">
        <div class="chips" id="m-chips">
          <button class="chip on" onclick="fltM('todos',this)">Todos</button>
          <button class="chip" onclick="fltM('deuda',this)">Con deuda</button>
          <button class="chip" onclick="fltM('DIAMANTE',this)">Diamante</button>
          <button class="chip" onclick="fltM('ORO',this)">Oro</button>
          <button class="chip" onclick="fltM('PLATA',this)">Plata</button>
          <button class="chip" onclick="fltM('BRONCE',this)">Bronce</button>
        </div>
        <div id="m-rows" class="card"></div>
      </div>
      <div id="m-detail" style="display:none"></div>
    </div>

    <!-- CATALOGO -->
    <div class="view" id="view-catalogo">
      <div class="chips" id="cat-chips"></div>
      <div id="cat-grid" class="g4" style="gap:16px"></div>
    </div>

    <!-- ESTADO DE CUENTA -->
    <div class="view" id="view-estado">
      <div class="no-print" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px">
        <select class="select-box" id="ec-sel" onchange="buildEC(this.value)">
          <option value="">Seleccionar miembro...</option>
        </select>
      </div>
      <div id="ec-out"></div>
    </div>

    <!-- FLUJO DE CAJA -->
    <div class="view" id="view-flujo">
      <div id="flujo-out"></div>
    </div>

  </div><!-- /content -->
</main>

<!-- ══ MOBILE TABS ══ -->
<nav class="m-tabs">
  <div class="m-tabs-inner">
    <button class="tab-btn on" onclick="go('inicio')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Inicio
    </button>
    <button class="tab-btn" onclick="go('miembros')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Miembros
    </button>
    <button class="tab-btn" onclick="go('catalogo')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="6" height="6" rx="1"/><rect x="9" y="3" width="6" height="6" rx="1"/><rect x="16" y="3" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="9" y="10" width="6" height="6" rx="1"/><rect x="16" y="10" width="6" height="6" rx="1"/></svg>
      Catálogo
    </button>
    <button class="tab-btn" onclick="go('estado')">

    <button class="tab-btn" onclick="go('flujo')">

<script>
// ══════════════════════════════════════════════
//  SQL.JS — WebAssembly SQLite
// ══════════════════════════════════════════════
let SQL=null, db=null;
let miembros=[], totales=[], articulos=[], ventas=[], pagos=[];
let mFlt='todos', mSearch='', catFlt='', catSearch='';

(function(){
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js';
  s.onload=()=>initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`}).then(S=>{SQL=S;});
  document.head.appendChild(s);
})();

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
const TITLES={inicio:'Dashboard',miembros:'Miembros',catalogo:'Catálogo',estado:'Estado de Cuenta',flujo:'Flujo de Caja'};
let cur='inicio';

function go(v){
  cur=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nav-btn,.tab-btn').forEach(x=>x.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll(`[onclick="go('${v}')"]`).forEach(x=>x.classList.add('on'));
  document.getElementById('topTitle').textContent=TITLES[v];
  const sb=document.getElementById('searchBox');
  const pb=document.getElementById('printBtn');
  sb.style.display=(v==='miembros'||v==='catalogo')?'':'none';
  pb.style.display=(v==='estado')?'':'none';
  if(v==='miembros'){sb.placeholder='Buscar miembro...';sb.value='';mSearch='';renderMembers();}
  if(v==='catalogo'){sb.placeholder='Buscar producto...';sb.value='';catSearch='';renderCat();}
  if(v==='flujo'&&db) renderFlujo();
}

// ══════════════════════════════════════════════
//  DB LOAD
// ══════════════════════════════════════════════
function onDrop(e){
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f) loadFile(f);
}
function loadFile(f){
  if(!f) return;
  if(!SQL){toast('Cargando motor SQLite, intenta en 2 segundos...');return;}
  if(f.name.toLowerCase().endsWith('.png')){
    loadFromPNG(f).catch(e=>toast('Error al leer PNG: '+e.message));
    return;
  }
  const r=new FileReader();
  r.onload=ev=>{
    try{
      db=new SQL.Database(new Uint8Array(ev.target.result));
      onLoaded(f.name);
    }catch(e){toast('Error al leer: '+e.message);}
  };
  r.readAsArrayBuffer(f);
}

function extractITxtChunk(buf, keyword){
  const u8=new Uint8Array(buf);
  const sig=[137,80,78,71,13,10,26,10];
  for(let i=0;i<8;i++) if(u8[i]!==sig[i]) throw new Error('No es un PNG valido');
  let pos=8;
  const dv=new DataView(buf);
  while(pos<u8.length){
    const len=dv.getUint32(pos); pos+=4;
    const type=String.fromCharCode(u8[pos],u8[pos+1],u8[pos+2],u8[pos+3]); pos+=4;
    if(type==='iTXt'){
      const chunkEnd=pos+len;
      let p=pos;
      let kwEnd=p;
      while(kwEnd<chunkEnd && u8[kwEnd]!==0) kwEnd++;
      const kw=new TextDecoder().decode(u8.slice(p,kwEnd));
      if(kw===keyword){
        p=kwEnd+1;
        const compFlag=u8[p++];
        p++;
        while(p<chunkEnd && u8[p]!==0) p++;
        p++;
        while(p<chunkEnd && u8[p]!==0) p++;
        p++;
        const textBytes=u8.slice(p,chunkEnd);
        return new TextDecoder().decode(textBytes);
      }
    }
    pos+=len+4;
  }
  throw new Error('No se encontro chunk iTXt "'+keyword+'" en el PNG');
}

async function loadFromPNG(f){
  if(!SQL) throw new Error('Motor SQLite no listo');
  const buf=await f.arrayBuffer();
  const b64=extractITxtChunk(buf,'resurge_db');
  const binStr=atob(b64);
  const compressed=new Uint8Array(binStr.length);
  for(let i=0;i<binStr.length;i++) compressed[i]=binStr.charCodeAt(i);
  const ds=new DecompressionStream('deflate');
  const writer=ds.writable.getWriter();
  writer.write(compressed);
  writer.close();
  const chunks=[];
  const reader=ds.readable.getReader();
  while(true){
    const {done,value}=await reader.read();
    if(done) break;
    chunks.push(value);
  }
  let total=0;
  chunks.forEach(c=>total+=c.length);
  const dbBytes=new Uint8Array(total);
  let off=0;
  chunks.forEach(c=>{dbBytes.set(c,off);off+=c.length;});
  db=new SQL.Database(dbBytes);
  onLoaded(f.name+' (PNG)');
}
function onLoaded(name){
  document.getElementById('landing').style.display='none';
  document.getElementById('dash').style.display='';
  const s=document.getElementById('dbStatus');
  s.className='db-status on';
  document.getElementById('dbStatusTxt').textContent=name;
  loadAll();
}

// ══════════════════════════════════════════════
//  QUERY HELPERS
// ══════════════════════════════════════════════
function q(sql,p=[]){
  try{
    const st=db.prepare(sql);st.bind(p);
    const rows=[];while(st.step())rows.push(st.getAsObject());
    st.free();return rows;
  }catch(e){console.warn(sql,e.message);return[];}
}
function q1(sql,p=[]){return q(sql,p)[0]||null;}

// ══════════════════════════════════════════════
//  LOAD ALL DATA
// ══════════════════════════════════════════════
function loadAll(){
  miembros  = q(`SELECT m.*, t.total_precios, t.total_pagado, t.total_deuda, t.puntos_acumulados
                 FROM miembros m
                 LEFT JOIN totales_miembros t ON t.id_miembro = m.id_unico
                 ORDER BY t.total_deuda DESC, m.nombre_miembro`);
  articulos = q(`SELECT * FROM articulos ORDER BY departamento, categoria, marca, articulo`);
  ventas    = q(`SELECT v.*, a.articulo, a.marca, a.departamento, a.categoria
                 FROM ventas v LEFT JOIN articulos a ON a.id_unico = v.id_articulo`);
  pagos     = q(`SELECT * FROM pagos ORDER BY fecha DESC`);
  renderDash();
  buildECSelect();
  buildCatChips();
}

// ══════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════
function renderDash(){
  const totalDeuda   = miembros.reduce((s,m)=>s+(parseFloat(m.total_deuda)||0),0);
  const totalCobrado = miembros.reduce((s,m)=>s+(parseFloat(m.total_pagado)||0),0);
  const totalVendido = miembros.reduce((s,m)=>s+(parseFloat(m.total_precios)||0),0);
  const conDeuda     = miembros.filter(m=>parseFloat(m.total_deuda)>0).length;
  const ingresos     = q1(`SELECT SUM(monto) as s FROM flujo_caja WHERE tipo='INGRESO'`)?.s||0;
  const egresos      = q1(`SELECT SUM(monto) as s FROM flujo_caja WHERE tipo='EGRESO'`)?.s||0;
  const balance      = ingresos - egresos;

  const topDeudores  = [...miembros].sort((a,b)=>(b.total_deuda||0)-(a.total_deuda||0)).slice(0,5);
  const recPagos     = pagos.slice(0,6);

  document.getElementById('dash').innerHTML=`
    <div class="g4" style="margin-bottom:24px">
      <div class="stat-card"><div class="lbl">Miembros</div><div class="val">${miembros.length}</div></div>
      <div class="stat-card"><div class="lbl">Con Deuda</div><div class="val err">${conDeuda}</div></div>
      <div class="stat-card"><div class="lbl">Total Vendido</div><div class="val">${fmt(totalVendido)}</div></div>
      <div class="stat-card"><div class="lbl">Total Cobrado</div><div class="val ok">${fmt(totalCobrado)}</div></div>
      <div class="stat-card"><div class="lbl">Cartera Vencida</div><div class="val err">${fmt(totalDeuda)}</div></div>
      <div class="stat-card"><div class="lbl">Artículos</div><div class="val">${articulos.length}</div></div>
      <div class="stat-card"><div class="lbl">Balance Caja</div><div class="val ${balance>=0?'ok':'err'}">${fmt(balance)}</div></div>
      <div class="stat-card"><div class="lbl">Ventas</div><div class="val">${ventas.length}</div></div>
    </div>
    <div class="g2">
      <div>
        <div class="section-lbl">MAYORES DEUDORES</div>
        <div class="card">
          ${topDeudores.map(m=>`
            <div class="row" onclick="openMember('${m.id_unico}')">
              <div style="display:flex;align-items:center;gap:11px;min-width:0">
                <div class="avatar">${(m.nombre_miembro||'?').charAt(0)}</div>
                <div style="min-width:0">
                  <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.nombre_miembro}</div>
                  <div style="font-size:.62rem;color:var(--muted2)">${m.membresia||''}</div>
                </div>
              </div>
              <div class="mov-m cargo">${fmt(m.total_deuda)}</div>
            </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="section-lbl">ÚLTIMOS PAGOS</div>
        <div class="card">
          ${recPagos.map(p=>`
            <div class="mov-row">
              <div>
                <div class="mov-t">${p.nombre_miembro}</div>
                <div class="mov-s">${p.fecha} · ${p.tipo_pago}</div>
              </div>
              <div class="mov-m abono">+${fmt(p.total)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
//  MIEMBROS

function openMember(uid){

  if(!m) return;
  const deuda=parseFloat(m.total_deuda)||0;
  const pagado=parseFloat(m.total_pagado)||0;

    <button class="back-btn no-print" onclick="backM()">

    <div style="display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap">

      <div>
        <h2 style="font-family:var(--serif);font-size:1.6rem;font-weight:400;margin-bottom:6px">${m.nombre_miembro}</h2>
        <span class="tag tag-${mem}">${m.membresia||'—'}</span>
        ${m.telefono?`<span style="font-size:.72rem;color:var(--muted2);margin-left:10px">${m.telefono}</span>`:''}
      </div>
      <button class="btn btn-g no-print" style="margin-left:auto" onclick="goEC('${uid}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Estado de cuenta
      </button>
    </div>

    <div class="hero-balance ${deuda>0?'red':'green'}">
      <div class="hl">Deuda Actual</div>
      <div class="hv">${deuda>0?'-':''}${fmt(Math.abs(deuda))}</div>
      <div class="stat-row">
        <div><div class="sl">Total Comprado</div><div class="sv">${fmt(total)}</div></div>
        <div><div class="sl">Total Pagado</div><div class="sv ok">${fmt(pagado)}</div></div>
        <div><div class="sl">Pagado</div><div class="sv">${pct}%</div></div>
      </div>
      ${total>0?`<div style="margin-top:18px">
        <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);margin-bottom:6px">
          <span>PROGRESO DE PAGO</span><span style="color:var(--ok)">${pct}%</span>
        </div>
        <div class="prog-track" style="height:7px">
          <div class="prog-fill ${pct>=90?'good':pct>=50?'mid':'bad'}" style="width:${pct}%"></div>
        </div>
      </div>`:''}
    </div>

    ${mVentas.length?`
      <div class="section-lbl" style="margin-top:24px">COMPRAS (${mVentas.length})</div>
      <div class="card">
        ${mVentas.map(v=>{
          const sp=parseFloat(v.saldo_pendiente)||0;
          const pv=parseFloat(v.precio_venta)||0;
          const ab=pv-sp;
          const vp=pv>0?Math.round((ab/pv)*100):0;
          return`<div class="ec-venta">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
              <div>
                <div style="font-weight:600;font-size:.88rem;margin-bottom:3px">${v.articulo||'—'} <span style="color:var(--muted2);font-size:.75rem">${v.marca||''}</span></div>
                <div style="font-size:.62rem;color:var(--muted)">${v.fecha} · ${v.tipo_venta} · ${v.id_perfil||''}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-weight:700;font-size:.9rem">${fmt(pv)}</div>
                <span class="tag ${v.estado==='PAGADA'?'tag-ok':sp>0?'tag-err':'tag-warn'}" style="margin-top:4px">${v.estado}</span>
              </div>
            </div>
            ${pv>0?`<div style="font-size:.65rem;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px">
              <span>Abonado: ${fmt(ab)}</span><span style="color:${sp>0?'var(--err)':'var(--ok)'}">Pendiente: ${fmt(sp)}</span>
            </div>
            <div class="prog-track"><div class="prog-fill ${vp>=100?'good':vp>=50?'mid':'bad'}" style="width:${vp}%"></div></div>`:''}
          </div>`;
        }).join('')}
      </div>`:''}

    ${mPagos.length?`
      <div class="section-lbl" style="margin-top:22px">ABONOS (${mPagos.length})</div>
      <div class="card">
        ${mPagos.map(p=>`
          <div class="mov-row">
            <div><div class="mov-t">${p.tipo_pago}</div><div class="mov-s">${p.fecha} · ${p.ubicacion||''}</div></div>
            <div class="mov-m abono">+${fmt(p.total)}</div>
          </div>`).join('')}
      </div>`:''}
  `;
}

function backM(){
  document.getElementById('m-detail').style.display='none';
  document.getElementById('m-list').style.display='';
}
function goEC(uid){
  go('estado');
  document.getElementById('ec-sel').value=uid;
  buildEC(uid);
}

// ══════════════════════════════════════════════
//  CATALOGO
// ══════════════════════════════════════════════
function buildCatChips(){
  const depts=[...new Set(articulos.map(a=>a.departamento).filter(Boolean))].sort();
  document.getElementById('cat-chips').innerHTML=
    `<button class="chip on" onclick="fltCat('',this)">Todo</button>`+
    depts.map(d=>`<button class="chip" onclick="fltCat('${d}',this)">${d}</button>`).join('');
}
function fltCat(f,btn){
  catFlt=f;
  document.querySelectorAll('#cat-chips .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderCat();
}
function renderCat(){
  let list=[...articulos];
  if(catFlt) list=list.filter(a=>a.departamento===catFlt);
  if(catSearch){
    const sq=catSearch.toLowerCase();
    list=list.filter(a=>((a.articulo||'')+(a.marca||'')+(a.categoria||'')+(a.detalles||'')+(a.color||'')).toLowerCase().includes(sq));

  const mPagos=pagos.filter(p=>p.id_miembro===uid).sort((a,b)=>b.fecha.localeCompare(a.fecha));

      <div class="stat-row">

        <div><div class="sl">Total Pagado</div><div class="sv ok">${fmt(pagado)}</div></div>
        <div><div class="sl">Avance</div><div class="sv">${pct}%</div></div>
      </div>
      ${total>0?`<div style="margin-top:20px">
        <div style="display:flex;justify-content:space-between;font-size:.58rem;color:var(--muted);margin-bottom:7px">

      </div>`:''}
    </div>

    ${mVentas.length?`
      <div class="section-lbl" style="margin-top:36px">COMPRAS REGISTRADAS</div>
      <div class="card">
        ${mVentas.map(v=>{
          const pv=parseFloat(v.precio_venta)||0;
          const sp=parseFloat(v.saldo_pendiente)||0;
          const ab=pv-sp;
          const vp=pv>0?Math.round((ab/pv)*100):0;
          // Abonos de esta venta
          const ventaPagos=q(`SELECT pd.*, p.fecha, p.tipo_pago FROM pagos_detalles pd
            JOIN pagos p ON p.id_unico=pd.id_unico_pago
            WHERE pd.id_unico_venta=? ORDER BY p.fecha DESC`,[v.id_unico]);
          return`<div class="ec-venta">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
              <div>
                <div style="font-family:var(--serif);font-size:1.1rem;font-weight:400;margin-bottom:4px">${v.articulo||'Artículo'}</div>
                <div style="font-size:.62rem;color:var(--muted)">${v.marca||''} · ${v.fecha} · ${v.id_perfil||'PRINCIPAL'}</div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:700;font-size:.95rem">${fmt(pv)}</div>
                <span class="tag ${v.estado==='PAGADA'?'tag-ok':sp>0?'tag-err':'tag-ok'}" style="margin-top:4px">${v.estado}</span>
              </div>
            </div>
            <div style="font-size:.64rem;display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="color:var(--ok)">Abonado: <strong>${fmt(ab)}</strong></span>
              <span style="color:${sp>0?'var(--err)':'var(--ok)'}">Pendiente: <strong>${fmt(sp)}</strong></span>
            </div>
            <div class="prog-track"><div class="prog-fill ${vp>=100?'good':vp>=50?'mid':'bad'}" style="width:${Math.min(vp,100)}%"></div></div>
            ${ventaPagos.length?`
              <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px">
                ${ventaPagos.map(ap=>`
                  <div style="display:flex;justify-content:space-between;font-size:.65rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)">
                    <span style="color:var(--muted)">${ap.fecha} <span style="color:var(--muted2)">${ap.tipo_pago||''}</span></span>
                    <span style="color:var(--ok)">+${fmt(ap.monto_aplicado)}</span>
                  </div>`).join('')}
              </div>`:''}
          </div>`;
        }).join('')}
      </div>`:''}

    <div style="margin-top:64px;padding-top:24px;border-top:1px solid var(--border);text-align:center;font-size:.56rem;letter-spacing:2px;color:var(--muted)">
      <div style="font-weight:700;margin-bottom:4px">ESTADO DE CUENTA · RESURGE</div>
      <div>GENERADO EL ${now}</div>
      <div style="margin-top:2px">APPRESURGE — SISTEMA DE GESTIÓN</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
//  FLUJO DE CAJA
// ══════════════════════════════════════════════
function renderFlujo(){
  const ingresos=q(`SELECT SUM(monto) as s,COUNT(*) as n FROM flujo_caja WHERE tipo='INGRESO'`)[0]||{};
  const egresos =q(`SELECT SUM(monto) as s,COUNT(*) as n FROM flujo_caja WHERE tipo='EGRESO'`)[0]||{};
  const balance =(parseFloat(ingresos.s)||0)-(parseFloat(egresos.s)||0);

  // Por categoría
  const porCat=q(`SELECT tipo,categoria,SUM(monto) as total,COUNT(*) as n FROM flujo_caja GROUP BY tipo,categoria ORDER BY tipo,total DESC`);
  // Últimos movimientos
  const ultimos=q(`SELECT * FROM flujo_caja ORDER BY rowid DESC LIMIT 30`);

  const el=document.getElementById('flujo-out');
  el.innerHTML=`
    <div class="g3" style="margin-bottom:24px">
      <div class="stat-card"><div class="lbl">Ingresos Totales</div><div class="val ok">${fmt(ingresos.s||0)}</div><div style="font-size:.62rem;color:var(--muted);margin-top:4px">${ingresos.n||0} movimientos</div></div>
      <div class="stat-card"><div class="lbl">Egresos Totales</div><div class="val err">${fmt(egresos.s||0)}</div><div style="font-size:.62rem;color:var(--muted);margin-top:4px">${egresos.n||0} movimientos</div></div>
      <div class="stat-card"><div class="lbl">Balance</div><div class="val ${balance>=0?'ok':'err'}">${fmt(balance)}</div></div>
    </div>
    <div class="g2">
      <div>
        <div class="section-lbl">POR CATEGORÍA</div>
        <div class="card">
          ${porCat.map(r=>`
            <div class="fl-row">
              <div>
                <div style="font-size:.8rem;font-weight:500">${r.categoria}</div>
                <div style="font-size:.62rem;color:var(--muted)">${r.n} movs · ${r.tipo}</div>
              </div>
              <div class="mov-m ${r.tipo==='INGRESO'?'abono':'cargo'}">${r.tipo==='INGRESO'?'+':'-'}${fmt(r.total)}</div>
            </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="section-lbl">ÚLTIMOS 30 MOVIMIENTOS</div>
        <div class="card">
          ${ultimos.map(r=>`
            <div class="fl-row">
              <div>
                <div style="font-size:.78rem">${r.descripcion||r.categoria}</div>
                <div style="font-size:.6rem;color:var(--muted)">${r.fecha}</div>
              </div>
              <div class="mov-m ${r.tipo==='INGRESO'?'abono':'cargo'}">${r.tipo==='INGRESO'?'+':'-'}${fmt(r.monto)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function fmt(n){
  const x=parseFloat(n);
  if(isNaN(x)) return '—';
  return '$'+x.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function toast(msg,dur=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
</script>
